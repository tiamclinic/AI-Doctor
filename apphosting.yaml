# Firebase App Hosting backend configuration
# https://firebase.google.com/docs/app-hosting/configure
#
# このファイルはリポジトリの root に置く必要があり、`git push` で GitHub に
# 反映されると Firebase App Hosting がこれを参照してビルド／デプロイする。

# Cloud Run（Next.js SSR / Route Handlers を動かすコンテナ）のスペック。
# MVP では小規模・スケール抑制の方向で設定し、暴騰を防ぐ。
# プロパティは公式仕様の cpu / memoryMiB / minInstances / maxInstances / concurrency のみ使用可。
runConfig:
  cpu: 1
  # Next.js 16 + sharp + Satori（next/og）で十分な余裕を持たせる。
  memoryMiB: 1024
  # コールドスタートは許容してコスト最優先（MVP）。
  minInstances: 0
  # 暴騰防止のための上限。本番運用が始まったら必要に応じて引き上げる。
  maxInstances: 3
  concurrency: 80

env:
  # OGP / シェアリンクで使う公開 URL。
  # App Hosting backend のドメインに合わせる。カスタムドメイン適用後は書き換える。
  - variable: NEXT_PUBLIC_APP_URL
    value: https://at-doctor--ai-doctor-5681b.us-east4.hosted.app
    availability:
      - BUILD
      - RUNTIME

  # Firestore Admin（院方コンテンツ T-13）。App Hosting では ADC が使える。
  - variable: FIREBASE_PROJECT_ID
    value: ai-doctor-5681b
    availability:
      - RUNTIME

  # Firebase Auth（管理画面ログイン・結果画面の「ドクター所見を追記」CTA）
  # 公開 Web 設定のため Secret 不要。BUILD + RUNTIME でクライアントに埋め込む。
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDRKUSJU4bPGvpW2YibShTUCcOd7l19NJU
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: ai-doctor-5681b.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: ai-doctor-5681b
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: ai-doctor-5681b.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "88086403893"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:88086403893:web:71e08302a73a842c5f0a7c
    availability:
      - BUILD
      - RUNTIME

  # OpenAI API キー — Cloud Secret Manager に保管したシークレットを参照する。
  # 事前に以下のコマンドで secret を登録しておくこと:
  #   npx -y firebase-tools@latest apphosting:secrets:set OPENAI_API_KEY
  #   npx -y firebase-tools@latest apphosting:secrets:grantaccess OPENAI_API_KEY --backend at-doctor
  # ビルド preparer がまだ失敗する場合は docs/09-deploy.md Step 4 の「手動 IAM」も実施。
  # 短い名前だと preparer が解決に失敗することがあるため、プロジェクト番号の完全パスを指定する。
  # 番号は Firebase Console > プロジェクトの設定 > 全般 の「プロジェクト番号」。
  - variable: OPENAI_API_KEY
    secret: projects/88086403893/secrets/OPENAI_API_KEY
    availability:
      - RUNTIME

  # OPENAI_ORG_ID は通常不要。組織 ID を切り替えたい場合のみ、別途 secret に
  # 登録した上で以下のブロックをコメントアウト解除して使用する。
  #   npx -y firebase-tools@latest apphosting:secrets:set OPENAI_ORG_ID
  # - variable: OPENAI_ORG_ID
  #   secret: OPENAI_ORG_ID
  #   availability:
  #     - RUNTIME
